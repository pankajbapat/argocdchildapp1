
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
      tier: database
  template:
    metadata:
      labels:
        app: db
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: password
        ports:
        - containerPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: cilium-demo
spec:
  selector:
    app: db
  ports:
  - port: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
      tier: application
  template:
    metadata:
      labels:
        app: app
        tier: application
    spec:
      containers:
      - name: app
        image: kennethreitz/httpbin
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: cilium-demo
spec:
  selector:
    app: app
  ports:
  - port: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cilium-demo
spec:
  selector:
    app: frontend
  ports:
  - port: 80