
apiVersion: v1
kind: Namespace
metadata:
  name: cilium-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
      tier: database
  template:
    metadata:
      labels:
        app: db
        tier: database
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_PASSWORD
          value: password
        ports:
        - containerPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: cilium-demo
spec:
  selector:
    app: db
  ports:
  - port: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
      tier: application
  template:
    metadata:
      labels:
        app: app
        tier: application
    spec:
      containers:
      - name: app
        image: kennethreitz/httpbin
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: cilium-demo
spec:
  selector:
    app: app
  ports:
  - port: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cilium-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cilium-demo
spec:
  selector:
    app: frontend
  ports:
  - port: 80

---
# ---------------------------------------------------------
# 2. Allow DNS Egress (CoreDNS in kube-system)
# ---------------------------------------------------------
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: cilium-demo
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP

---
# ---------------------------------------------------------
# 3. Allow Frontend -> Application (HTTP)
# ---------------------------------------------------------
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-frontend-to-application
  namespace: cilium-demo
spec:
  endpointSelector:
    matchLabels:
      app: app
      tier: application
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: frontend
        tier: frontend
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP

---
# ---------------------------------------------------------
# 4. Allow Application -> Database (PostgreSQL)
# ---------------------------------------------------------
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-application-to-database
  namespace: cilium-demo
spec:
  endpointSelector:
    matchLabels:
      app: db
      tier: database
  ingress:
  - fromEndpoints:
    - matchLabels:
        app: app
        tier: application
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP

---
# ---------------------------------------------------------
# 1. Default Deny (Ingress + Egress)
# ---------------------------------------------------------

apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
  namespace: cilium-demo
spec:
  endpointSelector: {}
  ingress: []
  egress: []